services:
  - type: web
    name: dhl-poc
    runtime: docker
    plan: free
    region: singapore
    autoDeployTrigger: commit
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: SARVAM_API_KEY
        sync: false
      - key: OPENAI_BASE_URL
        value: https://api.openai.com/v1
      - key: OPENAI_SUPERVISOR_MODEL
        value: gpt-4.1-mini
      - key: OPENAI_LANGUAGE_COACH_MODEL
        value: gpt-4.1-mini
      - key: OPENAI_CHAT_MODEL
        value: gpt-4.1
      - key: POLICY_ENGINE_MODE
        value: llm
      - key: ELEVENLABS_BASE_URL
        value: https://api.elevenlabs.io
      - key: ELEVENLABS_TTS_MODEL
        value: eleven_v3
      - key: ELEVENLABS_SUPPORTED_LANGUAGE_CODES
        value: en,hi,ta,mr,bn,te,gu,kn,ml,pa,or
      # Male-only POC. Krishna - Human-Like Sales Agent (standard Hindi accent),
      # added to the ElevenLabs account from the shared voice library. Baked in so
      # deploys work out of the box; override in the dashboard to change voice.
      - key: ELEVENLABS_DEFAULT_MALE
        value: iB2rIwm9cQCRGWoKDRtX
      - key: ELEVENLABS_DEFAULT_FEMALE
        value: iB2rIwm9cQCRGWoKDRtX
      - key: ELEVENLABS_TTS_SAMPLE_RATE_BROWSER
        value: "24000"
      - key: ELEVENLABS_TTS_SAMPLE_RATE_PHONE
        value: "8000"
      - key: ELEVENLABS_VOICE_STABILITY
        value: "0.5"
      - key: ELEVENLABS_VOICE_SIMILARITY
        value: "0.75"
      - key: ELEVENLABS_VOICE_STYLE
        value: "0.0"
      - key: ELEVENLABS_VOICE_SPEED
        value: "1.15"
      - key: ELEVENLABS_VOICE_SPEAKER_BOOST
        value: "1"
      - key: ELEVENLABS_TEXT_NORMALIZATION
        value: on
      - key: ELEVENLABS_PRON_DICT_ID
        value: F6QAB5Afyd7NaPO4vXlb
      - key: ELEVENLABS_PRON_DICT_VERSION_ID
        value: sfnJqQWMZwZGEWGBbGBd
      - key: ELEVENLABS_AUDIO_TAGS
        value: "1"
      - key: ELEVENLABS_TONE_DEFAULT
        value: professional
      - key: ELEVENLABS_TONE_EMPATHETIC
        value: empathetic
      - key: ELEVENLABS_TONE_FIRM
        value: firm
      - key: ELEVENLABS_USD_PER_MILLION_CHARS
        value: "100"
      - key: ELEVENLABS_USD_PER_MILLION_CHARS_FLASH
        value: "50"
      - key: TTS_HUMANIZE
        value: "1"
      - key: SARVAM_BASE_URL
        value: https://api.sarvam.ai
      - key: SARVAM_STT_MODEL
        value: saaras:v3
      - key: SARVAM_STT_WS_URL
        value: wss://api.sarvam.ai/speech-to-text/ws
      - key: SARVAM_STT_SAMPLE_RATE
        value: "16000"
      - key: SARVAM_STT_MODE
        value: codemix
      - key: SARVAM_INR_PER_USD
        value: "96.13"
      - key: SARVAM_STT_INR_PER_HOUR
        value: "30"
      - key: EXOTEL_ACCOUNT_SID
        sync: false
      - key: EXOTEL_API_KEY
        sync: false
      - key: EXOTEL_API_TOKEN
        sync: false
      - key: EXOTEL_API_BASE_URL
        value: https://api.in.exotel.com
      - key: EXOTEL_CALLER_ID
        sync: false
      - key: EXOTEL_STREAM_SAMPLE_RATE
        value: "8000"
      - key: DEMO_ACCOUNT_ID
        value: DHL001
      - key: DEFAULT_LANGUAGE_ID
        value: hinglish
      - key: FLASK_DEBUG
        value: "0"
      - key: RENDER_EXTERNAL_URL
        sync: false
